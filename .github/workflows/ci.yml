name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ──────────────────────────────────────────────
  # 1. Build Docker image
  # ──────────────────────────────────────────────
  build:
    name: 🐳 Build Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (runtime stage)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: runtime
          push: false
          tags: homiak-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────
  # 2. Lint (ruff + isort) — runs in Docker
  # ──────────────────────────────────────────────
  lint:
    name: 🔍 Lint (ruff + isort)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build dev image
        run: docker build --target dev -t homiak-backend:dev ./backend

      - name: Run ruff (includes import sorting via rule I)
        run: docker run --rm homiak-backend:dev ruff check src tests


  # ──────────────────────────────────────────────
  # 3. Tests + Coverage (via Docker Compose)
  # ──────────────────────────────────────────────
  test:
    name: 🧪 Tests & Coverage
    runs-on: ubuntu-latest
    needs: [build, lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create .env for tests
        run: |
          cat > backend/.env <<EOF
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=postgres
          DB_HOST=db
          DB_PORT=5432
          DB_NAME=homiakdb
          SECRET_KEY=ci-test-secret-key-not-for-production
          ALGORITHM=HS256
          ACCESS_TOKEN_EXPIRE_MINUTES=30
          REFRESH_TOKEN_EXPIRE_DAYS=7
          NBU_API_URL=https://bank.gov.ua/NBUStatService/v1/statdirectory/exchange?json
          GOOGLE_CLIENT_ID=dummy-google-client-id
          GOOGLE_CLIENT_SECRET=dummy-google-client-secret
          GITHUB_CLIENT_ID=dummy-github-client-id
          GITHUB_CLIENT_SECRET=dummy-github-client-secret
          EOF

      - name: Create reports directory
        run: mkdir -p backend/reports

      - name: Run tests with coverage via Docker Compose
        run: |
          docker compose -f docker-compose.backend.yml \
            --profile ci \
            up --build --abort-on-container-exit \
            --exit-code-from backend-test \
            backend-test

      - name: Tear down compose
        if: always()
        run: docker compose -f docker-compose.backend.yml --profile ci down -v

      - name: Upload coverage XML
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-xml
          path: backend/reports/coverage.xml
          retention-days: 30

      - name: Upload coverage HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-html
          path: backend/reports/htmlcov/
          retention-days: 30

      - name: Upload JUnit XML
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-xml
          path: backend/reports/junit.xml
          retention-days: 30

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: backend/reports/junit.xml
          comment_title: "🧪 Test Results"
          check_name: "Test Results"

      - name: Coverage summary
        uses: irongut/CodeCoverageSummary@v1.3.0
        if: always()
        with:
          filename: backend/reports/coverage.xml
          badge: true
          format: markdown
          hide_branch_rate: false
          hide_complexity: true
          indicators: true
          output: both
          thresholds: "60 80"

      - name: Add coverage PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        if: github.event_name == 'pull_request' && always()
        with:
          recreate: true
          path: code-coverage-results.md

  # ──────────────────────────────────────────────
  # 4. Build summary (видно у вкладці Summary)
  # ──────────────────────────────────────────────
  summary:
    name: 📋 Build Summary
    runs-on: ubuntu-latest
    needs: [build, lint, test]
    if: always()
    steps:
      - name: Write summary
        run: |
          echo "## 🏗️ Build Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🐳 Docker Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔍 Lint         | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 Tests        | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
